services:
  - type: web
    name: zaiko
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: DATABASE_URL
        sync: false   # Renderダッシュボードで手動設定
      - key: FLASK_ENV
        value: production
